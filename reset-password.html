<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password | Shoaib Mahin Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="container">
        <!-- Standalone Reset Password Form Card -->
        <div class="auth-wrapper">
            <div class="auth-card">
                <h2 class="auth-title">Update Password</h2>
                <p class="auth-subtitle">Type your new credentials below to restore secure account access.</p>
                
                <div id="resetMessage" class="form-message"></div>
                
                <form id="newPasswordForm">
                    <div class="form-group">
                        <label for="new_password">New Password</label>
                        <input type="password" id="new_password" class="form-control" required placeholder="Minimum 6 characters" minlength="6">
                    </div>
                    <div class="form-group" style="margin-bottom: 2rem;">
                        <label for="confirm_password">Confirm New Password</label>
                        <input type="password" id="confirm_password" class="form-control" required placeholder="Retype your new password">
                    </div>
                    <button type="submit" id="newPasswordSubmitBtn" class="btn btn-primary" style="width: 100%; padding: 1rem;">Update Password</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Supabase Client CDN Script -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
