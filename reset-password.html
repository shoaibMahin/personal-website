<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Shoaib Mahin Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            padding-top: 90px;
            background-color: #f8fafc;
        }
        
        .admin-container {
            max-width: 900px;
            margin: 0 auto 4rem;
            padding: 0 1.5rem;
        }

        .auth-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            padding: 3rem 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.03);
            max-width: 420px;
            margin: 4rem auto;
        }

        .auth-card h2 {
            margin-bottom: 0.5rem;
            font-size: 1.75rem;
            letter-spacing: -0.5px;
        }

        .auth-card p {
            color: #64748b;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    
    <!-- Header -->
    <header class="site-header">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                Shoaib<span>Mahin</span> <span style="font-size: 0.85rem; font-weight:500; color:#64748b; margin-left: 8px;">Reset Password</span>
            </a>
        </div>
    </header>

    <div class="admin-container">
        <!-- New Password Card -->
        <div id="newPasswordSection" class="auth-card">
            <h2>Set New Password</h2>
            <p>Enter your new password below.</p>
            <div id="resetMessage" class="form-message"></div>
            <form id="newPasswordForm">
                <div class="form-group">
                    <label for="new_password">New Password</label>
                    <input type="password" id="new_password" class="form-control" required placeholder="••••••••" minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm New Password</label>
                    <input type="password" id="confirm_password" class="form-control" required placeholder="••••••••" minlength="6">
                </div>
                <button type="submit" id="newPasswordSubmitBtn" class="btn btn-primary" style="width: 100%;">Update Password</button>
            </form>
        </div>
    </div>

    <!-- Supabase CDN Script -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
